# qPCR结果导出格式配置文件
# 你可以自定义导出格式并保存为模板

# 默认布局设置
layout:
  cols_per_sample: 2      # 每个样本占几列
  rows_per_gene: 2        # 每个基因占几行
  
# 预设导出格式
formats:
  # ★ 推荐格式：Sample在行，Gene在列（每个Sample多行显示Ct重复）
  sample_gene_vertical:
    name: "Sample-Gene 竖向布局"
    description: "每行是Sample，每列是Gene，每个Sample的多个Ct值竖着排列"
    row_type: "sample"    # 行是sample还是gene
    col_type: "gene"      # 列是sample还是gene
    ct_direction: "vertical"  # Ct值排列方向：vertical竖向，horizontal横向
    default: true         # 是否为默认格式
    
  # Gene在行，Sample在列（每个Gene多行显示Ct）
  gene_sample_vertical:
    name: "Gene-Sample 竖向布局"
    description: "每行是Gene，每列是Sample，每个Gene的多个Ct值竖着排列"
    row_type: "gene"
    col_type: "sample"
    ct_direction: "vertical"
    default: false
    
  # Gene在行，Sample在列（每个Gene一行，Ct横排）
  gene_sample_horizontal:
    name: "Gene-Sample 横向布局"  
    description: "每行是Gene，每列是Sample，每个Sample的Ct值横着排列"
    row_type: "gene"
    col_type: "sample"
    ct_direction: "horizontal"
    default: false

# 自定义样本名称（留空则自动生成Sample1, Sample2...）
sample_names: []
# 示例: ["Control1", "Control2", "Treatment1", "Treatment2"]

# 自定义基因名称（留空则自动生成Gene1, Gene2...）
gene_names: []
# 示例: ["GAPDH", "GeneA", "GeneB", "GeneC"]

# 界面主题
theme:
  style: "modern"         # modern, classic, dark
  primary_color: "#2563eb"
  accent_color: "#10b981"
  font_family: "Microsoft YaHei UI"

